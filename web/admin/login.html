<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carolas Green</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#798839">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Carolas Green">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #798839 0%, #babd6f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-logo {
            width: 100px;
            height: auto;
            margin-bottom: 1rem;
        }

        .login-header h1 {
            color: #798839;
            margin-bottom: 0.5rem;
        }

        .login-header p {
            color: #6b7960;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #798839;
            font-weight: bold;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #c4bbb5;
            border-radius: 5px;
            font-size: 1rem;
            font-family: inherit;
        }

        .form-group input:focus {
            outline: none;
            border-color: #798839;
            box-shadow: 0 0 5px rgba(121, 136, 57, 0.3);
        }

        .btn-login {
            width: 100%;
            padding: 0.75rem;
            background-color: #798839;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .btn-login:hover {
            background-color: #6b7960;
        }

        .btn-login:disabled {
            background-color: #c4bbb5;
            cursor: not-allowed;
        }

        .error-message {
            color: #ff4757;
            margin-top: 1rem;
            padding: 0.75rem;
            background-color: #ffe0e0;
            border-radius: 5px;
            display: none;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 1rem;
        }

        .spinner {
            border: 3px solid #babd6f;
            border-top: 3px solid #798839;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .info-box {
            background-color: #e5e1d9;
            padding: 1rem;
            border-radius: 5px;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: #6b7960;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <img src="../../LOGO/logo.jpg" alt="Carolas Green" class="login-logo">
            <h1>Panel Admin</h1>
            <p>Carolas Green</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="admin@example.com">
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required placeholder="••••••••">
            </div>

            <button type="submit" class="btn-login" id="loginBtn">Iniciar Sesión</button>

            <div class="loading" id="loading">
                <div class="spinner"></div>
            </div>

            <div class="error-message" id="errorMessage"></div>
        </form>

    </div>

    <script type="module">
        import { auth } from '../js/firebase-config.js';
        import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-auth.js";

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch((error) => {
                    console.warn('Service Worker registration failed:', error);
                });
            });
        }

        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const loading = document.getElementById('loading');
        const errorMessage = document.getElementById('errorMessage');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = emailInput.value;
            const password = passwordInput.value;

            loginBtn.disabled = true;
            loading.style.display = 'block';
            errorMessage.style.display = 'none';

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                localStorage.setItem('adminUser', JSON.stringify({
                    uid: userCredential.user.uid,
                    email: userCredential.user.email
                }));
                window.location.href = 'dashboard.html';
            } catch (error) {
                loading.style.display = 'none';
                loginBtn.disabled = false;
                
                let mensaje = 'Error al iniciar sesión';
                if (error.code === 'auth/user-not-found') {
                    mensaje = 'Usuario no encontrado';
                } else if (error.code === 'auth/wrong-password') {
                    mensaje = 'Contraseña incorrecta';
                } else if (error.code === 'auth/invalid-email') {
                    mensaje = 'Email inválido';
                }
                
                errorMessage.textContent = mensaje;
                errorMessage.style.display = 'block';
                console.error('Error de autenticación:', error);
            }
        });

        // Redirigir si ya está logeado
        const adminUser = localStorage.getItem('adminUser');
        if (adminUser) {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
